version: 0.1.0
name: qilian_forest_data_contract
说明: >
  本文件用于对齐业务语义、本体概念、SQLite 事实表字段、Neo4j 知识图谱属性和推荐工具。
  它不是原始数据，也不是本体替代品；它是智能体进行数据源选择和字段落地的契约。
principles:
  - 数量、排行、分布、均值、最大最小值等事实统计，优先使用 SQLite 事实表或已封装确定性工具。
  - 概念、指标含义、公式依赖、字段含义，优先使用本体和知识注册表。
  - 实体关系、证据链、知识来源，可使用知识图谱；但不能把本体属性直接当作 Neo4j 物理属性。
  - Neo4j 查询必须使用本文件声明的 kg_label、kg_property 和 relation_path；未声明时不要猜测。
  - 工具未命中不等于事实不存在，应根据 data_contract 换用合适数据源验证。

entities:
  taxon:
    label_cn: 树种/分类单元
    semantic_class: Taxon
    aliases: [树种, 物种, 分类单元, 青海云杉, 祁连圆柏, 红桦, 白桦, 山杨, 乌柳, 花楸]
    sqlite:
      primary_table: tree_observations
      primary_field: species
      grain: tree_observation
      examples: [青海云杉, 祁连圆柏, 红桦, 白桦, 山杨, 乌柳, 花楸]
    kg:
      label: Taxon
      identity_property: taxon_key
      display_property: accepted_name_cn
      scientific_name_property: scientific_name
      relation_path_from_tree: "(:TreeIndividual)-[:HAS_TAXON]->(:Taxon)"
      note: TreeObservation 节点默认不保存 species 字段，树种应通过 TreeIndividual 到 Taxon 的关系获取。
    preferred_fact_source: sqlite
    preferred_fact_tools: [tool_inspect_forest_data, tool_run_forest_analysis_protocol]

  subplot:
    label_cn: 样方
    semantic_class: Subplot
    aliases: [样方, 小样方, 样地单元]
    sqlite:
      primary_table: tree_observations
      primary_field: subplot_id
      grain: subplot
    kg:
      label: Subplot
      identity_property: subplot_id
      relation_path_to_tree: "(:Subplot)-[:HAS_TREE]->(:TreeIndividual)"
    preferred_fact_source: sqlite

  tree_individual:
    label_cn: 单木
    semantic_class: TreeIndividual
    aliases: [单木, 树木, 个体, 树号]
    sqlite:
      primary_table: tree_observations
      primary_field: tree_id
      grain: tree
    kg:
      label: TreeIndividual
      identity_property: tree_id
      observation_path: "(:TreeIndividual)-[:HAS_OBSERVATION]->(:TreeObservation)"
      taxon_path: "(:TreeIndividual)-[:HAS_TAXON]->(:Taxon)"
    preferred_fact_source: sqlite

fields:
  species:
    name_cn: 树种中文名
    semantic_class: Taxon
    semantic_property: accepted_name_cn
    aliases: [树种, 树名, 物种, 中文名, accepted_name_cn]
    sqlite:
      table: tree_observations
      field: species
      grain: tree_observation
    kg:
      label: Taxon
      property: accepted_name_cn
      access_path: "(:TreeIndividual)-[:HAS_TAXON]->(:Taxon)"
    preferred_source_for_statistics: sqlite
    notes:
      - SQLite 中字段名是 species。
      - KG 中不要查询 TreeObservation.species；应通过 Taxon.accepted_name_cn 查询。

  tree_dbh_cm:
    name_cn: 胸径
    semantic_class: TreeObservation
    semantic_property: tree_dbh_cm
    aliases: [胸径, DBH, dbh, 树径]
    unit: cm
    sqlite: {table: tree_observations, field: tree_dbh_cm, grain: tree_observation}
    kg: {label: TreeObservation, property: tree_dbh_cm, access_path: "(:TreeIndividual)-[:HAS_OBSERVATION]->(:TreeObservation)"}
    preferred_source_for_statistics: sqlite

  tree_height_m:
    name_cn: 树高
    semantic_class: TreeObservation
    semantic_property: tree_height_m
    aliases: [树高, 高度, H, height]
    unit: m
    sqlite: {table: tree_observations, field: tree_height_m, grain: tree_observation}
    kg: {label: TreeObservation, property: tree_height_m, access_path: "(:TreeIndividual)-[:HAS_OBSERVATION]->(:TreeObservation)"}
    preferred_source_for_statistics: sqlite

  tree_x_m:
    name_cn: 样方内 X 坐标
    semantic_class: TreeObservation
    aliases: [X坐标, x_m, tree_x_m, 横坐标]
    unit: m
    sqlite: {table: tree_observations, field: tree_x_m, grain: tree_observation}
    kg: {label: TreeObservation, property: tree_x_m, access_path: "(:TreeIndividual)-[:HAS_OBSERVATION]->(:TreeObservation)"}
    preferred_source_for_statistics: sqlite

  tree_y_m:
    name_cn: 样方内 Y 坐标
    semantic_class: TreeObservation
    aliases: [Y坐标, y_m, tree_y_m, 纵坐标]
    unit: m
    sqlite: {table: tree_observations, field: tree_y_m, grain: tree_observation}
    kg: {label: TreeObservation, property: tree_y_m, access_path: "(:TreeIndividual)-[:HAS_OBSERVATION]->(:TreeObservation)"}
    preferred_source_for_statistics: sqlite

  health_status:
    name_cn: 健康状态
    semantic_class: TreeObservation
    aliases: [健康, 健康状况, 状态, health_status]
    sqlite: {table: tree_observations, field: health_status, grain: tree_observation}
    kg: {label: TreeObservation, property: health_status, access_path: "(:TreeIndividual)-[:HAS_OBSERVATION]->(:TreeObservation)"}
    preferred_source_for_statistics: sqlite

  elevation_m:
    name_cn: 单木地形点海拔
    semantic_class: TreeTopographyContext
    semantic_property: elevation_m
    aliases: [海拔, 高程, elevation, elevation_m]
    unit: m
    sqlite:
      table: topography_observations
      field: elevation_m
      grain: tree
      join:
        left_table: tree_observations
        left_key: tree_id
        right_table: topography_observations
        right_key: tree_id
    kg:
      available: false
      note: 当前 Neo4j 未物化 TreeTopographyContext 节点，地形数值应走 SQLite 或地形工具。
    preferred_source_for_statistics: sqlite
    preferred_tools: [tool_get_tree_topography_context, tool_get_subplot_topography_summary, tool_run_forest_analysis_protocol]

  slope_degree:
    name_cn: 坡度
    semantic_class: TreeTopographyContext
    aliases: [坡度, slope, slope_degree]
    unit: degree
    sqlite:
      table: topography_observations
      field: slope_degree
      grain: tree
      join: {left_table: tree_observations, left_key: tree_id, right_table: topography_observations, right_key: tree_id}
    kg: {available: false}
    preferred_source_for_statistics: sqlite

  aspect_degree:
    name_cn: 坡向
    semantic_class: TreeTopographyContext
    aliases: [坡向, aspect, aspect_degree]
    unit: degree
    sqlite:
      table: topography_observations
      field: aspect_degree
      grain: tree
      join: {left_table: tree_observations, left_key: tree_id, right_table: topography_observations, right_key: tree_id}
    kg: {available: false}
    preferred_source_for_statistics: sqlite

  mean_temperature_c:
    name_cn: 日平均气温
    semantic_class: ClimateObservation
    aliases: [平均气温, 气温, 温度, mean_temperature_c]
    unit: celsius
    sqlite: {table: climate_daily_normalized, field: mean_temperature_c, grain: station_day}
    kg: {available: false}
    preferred_source_for_statistics: sqlite

  precipitation_mm:
    name_cn: 日降水量
    semantic_class: ClimateObservation
    aliases: [降水, 降水量, precipitation, precipitation_mm]
    unit: mm
    sqlite: {table: climate_daily_normalized, field: precipitation_mm, grain: station_day}
    kg: {available: false}
    preferred_source_for_statistics: sqlite

common_query_patterns:
  taxon_topography_ranking:
    label_cn: 按树种统计地形因子并排序
    examples: [哪个样方的青海云杉海拔最高, 乌柳主要分布在哪些海拔, 青海云杉最高海拔样方]
    preferred_source: sqlite
    required_fields: [species, subplot_id, tree_id, elevation_m]
    join_path: "tree_observations.tree_id = topography_observations.tree_id"
    operation_template: "filter species -> join topography -> group by subplot_id -> aggregate metric -> order"
    avoid_kg_patterns:
      - "(:TreeObservation {species: ...})"
      - "TreeObservation.species"
      - "Taxon.chinese_name"
      - "Taxon.species_name"