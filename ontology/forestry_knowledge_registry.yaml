formulas:
- knowledge_id: F_SPECIES_RICHNESS_V1
  name_cn: 乔木层物种丰富度统计公式
  label: MathematicalDefinition
  expression: S = count(distinct valid_taxon_id)
  version: 1.0.0
  calculation_basis:
    vegetation_layer: tree
    abundance_basis: stem_count
    unknown_taxon_policy: exclude
  symbol_mappings:
    S: VAR_SPECIES_RICHNESS
  consumes_inputs: []
  produces_indicator: VAR_SPECIES_RICHNESS
  tool_binding: calculate_species_diversity_metrics
- knowledge_id: F_SPECIES_RELATIVE_ABUNDANCE_STEM_V1
  name_cn: 乔木层物种相对多度比例方程 (基于株数)
  label: MathematicalDefinition
  expression: p_i = n_i / N_valid
  version: 1.0.0
  calculation_basis:
    vegetation_layer: tree
    abundance_basis: stem_count
    unknown_taxon_policy: exclude
  symbol_mappings:
    p_i: VAR_SPECIES_ABUNDANCE
    n_i: VAR_SPECIES_STEM_COUNT
    N_valid: VAR_TOTAL_TREE_COUNT
  consumes_inputs:
  - VAR_SPECIES_STEM_COUNT
  - VAR_TOTAL_TREE_COUNT
  produces_indicator: VAR_SPECIES_ABUNDANCE
  tool_binding: calculate_species_diversity_metrics
- knowledge_id: F_SHANNON_STEM_V1
  name_cn: Shannon-Wiener 乔木层多样性指数公式 (自然对数)
  label: MathematicalDefinition
  expression: H' = - ∑ (p_i * ln(p_i))
  version: 1.0.0
  calculation_basis:
    vegetation_layer: tree
    abundance_basis: stem_count
    logarithm_base: e
    unknown_taxon_policy: exclude
  test_cases:
  - name: 两物种均等群落 (50:50)
    inputs:
      p_i:
      - 0.5
      - 0.5
    expected_output: 0.693147
  - name: 单物种纯林 (100%)
    inputs:
      p_i:
      - 1.0
    expected_output: 0.0
  symbol_mappings:
    H': ID_SHANNON_INDEX
    p_i: VAR_SPECIES_ABUNDANCE
  consumes_inputs:
  - VAR_SPECIES_ABUNDANCE
  produces_indicator: ID_SHANNON_INDEX
  depends_on:
  - F_SPECIES_RELATIVE_ABUNDANCE_STEM_V1
  tool_binding: calculate_species_diversity_metrics
- knowledge_id: F_SIMPSON_1_MINUS_LAMBDA_V1
  name_cn: Simpson 乔木层多样性指数公式 (1-lambda)
  label: MathematicalDefinition
  expression: D = 1 - ∑ (p_i^2)
  version: 1.0.0
  calculation_basis:
    vegetation_layer: tree
    abundance_basis: stem_count
    unknown_taxon_policy: exclude
  symbol_mappings:
    D: ID_SIMPSON_INDEX
    p_i: VAR_SPECIES_ABUNDANCE
  consumes_inputs:
  - VAR_SPECIES_ABUNDANCE
  produces_indicator: ID_SIMPSON_INDEX
  depends_on:
  - F_SPECIES_RELATIVE_ABUNDANCE_STEM_V1
  tool_binding: calculate_species_diversity_metrics
- knowledge_id: F_PIELOU_EVENNESS_STEM_V1
  name_cn: Pielou 乔木层均匀度指数公式 (基于未舍入 Shannon)
  label: MathematicalDefinition
  expression: J = H'_raw / ln(S) (当 S > 1 时，否则为 None)
  version: 1.0.0
  calculation_basis:
    vegetation_layer: tree
    abundance_basis: stem_count
    logarithm_base: e
    unknown_taxon_policy: exclude
    rounding_protection: 严禁在计算 J 前对 H_raw 舍入
  symbol_mappings:
    J: ID_PIELOU_EVENNESS
    H'_raw: ID_SHANNON_INDEX
    S: VAR_SPECIES_RICHNESS
  consumes_inputs:
  - ID_SHANNON_INDEX
  - VAR_SPECIES_RICHNESS
  produces_indicator: ID_PIELOU_EVENNESS
  depends_on:
  - F_SHANNON_STEM_V1
  - F_SPECIES_RICHNESS_V1
  tool_binding: calculate_species_diversity_metrics
- knowledge_id: F_DOMINANT_SPECIES_STEM_PROPORTION_V1
  name_cn: 乔木层优势树种株数比例公式
  label: MathematicalDefinition
  expression: P_dom = max(n_i) / N_valid
  version: 1.0.0
  calculation_basis:
    vegetation_layer: tree
    abundance_basis: stem_count
    unknown_taxon_policy: exclude
  symbol_mappings:
    P_dom: ID_DOMINANT_SPECIES_PROPORTION
    max_n_i: VAR_SPECIES_STEM_COUNT
    N_valid: VAR_TOTAL_TREE_COUNT
  consumes_inputs:
  - VAR_SPECIES_STEM_COUNT
  - VAR_TOTAL_TREE_COUNT
  produces_indicator: ID_DOMINANT_SPECIES_PROPORTION
  tool_binding: calculate_species_diversity_metrics
- knowledge_id: F_QUADRATIC_MEAN_DBH
  name_cn: 平方平均胸径公式 (断面积均木)
  label: MathematicalDefinition
  expression: D_q = sqrt(∑(D_i^2) / n)
  version: '1.0'
  symbol_mappings:
    D_q: ID_QUADRATIC_MEAN_DBH
    D_i: VAR_TREE_DBH
    n: VAR_TOTAL_TREE_COUNT
  consumes_inputs:
  - VAR_TREE_DBH
  produces_indicator: ID_QUADRATIC_MEAN_DBH
  tool_binding: calculate_stand_structure_metrics
- knowledge_id: F_SPATIAL_DISTANCE
  name_cn: 平面欧几里得距离公式
  label: MathematicalDefinition
  expression: dist = sqrt((x1-x2)^2 + (y1-y2)^2)
  version: '1.0'
  symbol_mappings:
    dist: VAR_SPATIAL_DISTANCE
  consumes_inputs: []
  produces_indicator: VAR_SPATIAL_DISTANCE
- knowledge_id: F_CROWN_WIDTH_MEAN
  name_cn: 单木平均冠幅计算方程
  label: ForestryBiometricsFormula
  expression: W_mean = (W_EW + W_NS) / 2
  version: '1.0'
  symbol_mappings:
    W_mean: VAR_CROWN_WIDTH
    W_EW: VAR_CROWN_WIDTH_EW
    W_NS: VAR_CROWN_WIDTH_NS
  consumes_inputs:
  - VAR_CROWN_WIDTH_EW
  - VAR_CROWN_WIDTH_NS
  produces_indicator: VAR_CROWN_WIDTH
- knowledge_id: F_TREE_BASAL_AREA
  name_cn: 单木胸高断面积计算方程
  label: ForestryBiometricsFormula
  expression: G_i = (π / 4) * (D / 100)^2
  version: '1.0'
  symbol_mappings:
    G_i: VAR_TREE_BASAL_AREA
    D: VAR_TREE_DBH
  consumes_inputs:
  - VAR_TREE_DBH
  produces_indicator: VAR_TREE_BASAL_AREA
  tool_binding: calculate_stand_structure_metrics
- knowledge_id: F_STAND_DENSITY
  name_cn: 林分单位面积密度换算方程
  label: ForestryBiometricsFormula
  expression: ρ = (N / Area) * 10000
  version: '1.0'
  symbol_mappings:
    ρ: ID_STAND_DENSITY
    N: VAR_TOTAL_TREE_COUNT
    Area: VAR_SUBPLOT_AREA
  consumes_inputs:
  - VAR_TOTAL_TREE_COUNT
  - VAR_SUBPLOT_AREA
  produces_indicator: ID_STAND_DENSITY
  tool_binding: calculate_stand_structure_metrics
- knowledge_id: F_HEIGHT_DIAMETER_RATIO
  name_cn: 单木高径比测树公式
  label: ForestryBiometricsFormula
  expression: HDR = (100 * H_m) / D_cm
  version: '1.0'
  symbol_mappings:
    HDR: ID_HEIGHT_DIAMETER_RATIO
    H_m: VAR_TREE_HEIGHT
    D_cm: VAR_TREE_DBH
  consumes_inputs:
  - VAR_TREE_HEIGHT
  - VAR_TREE_DBH
  produces_indicator: ID_HEIGHT_DIAMETER_RATIO
  tool_binding: calculate_tree_morphology_metrics
- knowledge_id: F_SUBPLOT_VOL_SUM
  name_cn: 样方总蓄积求和公式
  label: ForestryBiometricsFormula
  expression: V_plot = ∑ V_i(t)
  version: '1.0'
  symbol_mappings:
    V_plot: ID_SUBPLOT_TOTAL_VOLUME
    V_i: VAR_TREE_VOL
  consumes_inputs:
  - VAR_TREE_VOL
  produces_indicator: ID_SUBPLOT_TOTAL_VOLUME
  depends_on:
  - F_VOL_2D_TABLE
  tool_binding: calculate_volume_metrics
- knowledge_id: F_TREE_BIOMASS
  name_cn: 单木地上生物量估算方程
  label: ForestryBiometricsFormula
  expression: W = V * ρ * BEF
  version: '1.0'
  symbol_mappings:
    W: ID_TREE_BIOMASS
    V: VAR_TREE_VOL
  consumes_inputs:
  - VAR_TREE_VOL
  produces_indicator: ID_TREE_BIOMASS
  depends_on:
  - F_VOL_2D_TABLE
- knowledge_id: F_TREE_CARBON
  name_cn: 单木碳储量估算方程
  label: ForestryBiometricsFormula
  expression: C = W * CF (默认0.5)
  version: '1.0'
  symbol_mappings:
    C: ID_TREE_CARBON
    W: ID_TREE_BIOMASS
  consumes_inputs:
  - ID_TREE_BIOMASS
  produces_indicator: ID_TREE_CARBON
  depends_on:
  - F_TREE_BIOMASS
- knowledge_id: F_HEGYI_COMPETITION
  name_cn: Hegyi 空间竞争指数公式
  label: ForestryBiometricsFormula
  expression: C_i = ∑ ((D_j / D_i) / dist_ij)
  version: '1.0'
  symbol_mappings:
    C_i: ID_HEGYI_COMPETITION
    D_i: VAR_TREE_DBH
    dist_ij: VAR_SPATIAL_DISTANCE
  consumes_inputs:
  - VAR_TREE_DBH
  - VAR_SPATIAL_DISTANCE
  produces_indicator: ID_HEGYI_COMPETITION
  depends_on:
  - F_SPATIAL_DISTANCE
- knowledge_id: F_TREE_HEIGHT_DIAMETER_RATIO_V1
  name_cn: 高径比计算公式
  label: MathematicalDefinition
  expression: tree_height_m * 100 / tree_dbh_cm
  version: 1.0.0
  calculation_method: formal_calculation
  calculation_status: ready
  indicator_group: tree_morphology
  parameters: []
  consumes_inputs:
  - VAR_TREE_HEIGHT
  - VAR_TREE_DBH
