variables:
- variable_id: VAR_TREE_DBH
  name_cn: 单木胸径 DBH
  label: RawMeasuredVariable
  canonical_unit: cm
  level: tree
  source_class: TreeObservation
  property_key: tree_dbh_cm
- variable_id: VAR_TREE_HEIGHT
  name_cn: 单木树高 H
  label: RawMeasuredVariable
  canonical_unit: m
  level: tree
  source_class: TreeObservation
  property_key: tree_height_m
- variable_id: VAR_CROWN_WIDTH_EW
  name_cn: 东西向冠幅 W_EW
  label: RawMeasuredVariable
  canonical_unit: m
  level: tree
  source_class: TreeObservation
  property_key: crown_width_ew_m
- variable_id: VAR_CROWN_WIDTH_NS
  name_cn: 南北向冠幅 W_NS
  label: RawMeasuredVariable
  canonical_unit: m
  level: tree
  source_class: TreeObservation
  property_key: crown_width_ns_m
- variable_id: VAR_CROWN_WIDTH
  name_cn: 平均冠幅 W_mean
  label: IntermediateSharedVariable
  canonical_unit: m
  level: tree
  source_class: TreeObservation
  property_key: crown_width_mean_m
  definition: 单木东西向冠幅与南北向冠幅的算术平均值 W_mean = (W_EW + W_NS) / 2
- variable_id: VAR_CROWN_BASE_HEIGHT
  name_cn: 枝下高/冠底高 H_cb
  label: RawMeasuredVariable
  canonical_unit: m
  level: tree
  source_class: TreeObservation
  property_key: crown_base_height_m
- variable_id: VAR_SUBPLOT_AREA
  name_cn: 样方面积 Area
  label: RawMeasuredVariable
  canonical_unit: m²
  level: subplot
  source_class: Subplot
  property_key: area_m2
- variable_id: VAR_SPECIES_STEM_COUNT
  name_cn: 物种单木株数 n_i
  label: IntermediateSharedVariable
  canonical_unit: count
  level: species_group
  definition: 样方内某一特定树种(Species)的乔木个体总数，用于多度比与群落结构计算。
- variable_id: VAR_TOTAL_TREE_COUNT
  name_cn: 样方乔木总株数 N
  label: IntermediateSharedVariable
  canonical_unit: count
  level: subplot
  definition: 样方内所有活立木的总总株数，绝对区别于特定物种的单树种株数。
- variable_id: VAR_SPECIES_RICHNESS
  name_cn: 物种丰富度数 S
  label: IntermediateSharedVariable
  canonical_unit: count
  level: subplot
  definition: 样方内出现的不同乔木分类分类群(Taxon)种类总数。
- variable_id: VAR_SPECIES_ABUNDANCE
  name_cn: 物种相对多度比 p_i
  label: IntermediateSharedVariable
  canonical_unit: ratio
  level: species_group
  definition: 某特定物种个体数 n_i 占群落总个体数 N 的比例，是 Shannon/Simpson 等指数的计算基石。
- variable_id: VAR_TREE_VOL
  name_cn: 单木二元材积 V_i
  label: IntermediateSharedVariable
  canonical_unit: m³
  level: tree
  definition: 通过二元立木蓄积矩阵查对插值所得的单株木材积，作为林分总蓄积和生物量的共享输入。
- variable_id: VAR_TREE_BASAL_AREA
  name_cn: 单木胸高断面积 G_i
  label: IntermediateSharedVariable
  canonical_unit: m²
  level: tree
  property_key: basal_area_m2
- variable_id: VAR_SPATIAL_DISTANCE
  name_cn: 相邻木欧氏距离 dist_ij
  label: IntermediateSharedVariable
  canonical_unit: m
  level: tree_pair
- variable_id: VAR_TREE_ELEVATION
  name_cn: 单木地形点海拔
  label: RawMeasuredVariable
  canonical_unit: m
  level: tree
  source_class: TreeTopographyContext
  property_key: elevation_m
- variable_id: VAR_TREE_SLOPE_DEGREE
  name_cn: 单木地形点坡度
  label: RawMeasuredVariable
  canonical_unit: degree
  level: tree
  source_class: TreeTopographyContext
  property_key: slope_degree
- variable_id: VAR_TREE_ASPECT_DEGREE
  name_cn: 单木地形点坡向
  label: RawMeasuredVariable
  canonical_unit: degree
  level: tree
  source_class: TreeTopographyContext
  property_key: aspect_degree
- variable_id: VAR_CLIMATE_MEAN_TEMPERATURE
  name_cn: 日均气温
  label: RawMeasuredVariable
  canonical_unit: celsius
  level: station_day
  source_class: ClimateObservation
  property_key: mean_temperature_c
- variable_id: VAR_CLIMATE_PRECIPITATION
  name_cn: 日降水量
  label: RawMeasuredVariable
  canonical_unit: mm
  level: station_day
  source_class: ClimateObservation
  property_key: precipitation_mm
- variable_id: VAR_CLIMATE_WIND_SPEED
  name_cn: 日均风速
  label: RawMeasuredVariable
  canonical_unit: m_s
  level: station_day
  source_class: ClimateObservation
  property_key: wind_speed_m_s
