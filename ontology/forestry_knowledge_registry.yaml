    formula_id: F_DOMINANT_SPECIES_STEM_PROPORTION_V1
- indicator_id: TREE_HEIGHT_DIAMETER_RATIO
  name_cn: 高径比
  label: DerivedIndicator
  canonical_unit: ratio
  level: tree
  property_key: height_diameter_ratio
  indicator_group: tree_morphology
  calculation_status: ready
  evidence_level: formal_calculation
  applicability_status: requires_positive_dbh_and_height
  quality_flags:
  - MISSING_TREE_HEIGHT
  - MISSING_TREE_DBH
  - INVALID_TREE_DBH
  interpretation_boundary:
    allowed: 描述树体细长程度。
    not_allowed: 不能单独判断风折、死亡、病虫害或生长受限原因。
  calculation:
    type: formula
    executor: formula_execution_engine
    formula_id: F_TREE_HEIGHT_DIAMETER_RATIO_V1
