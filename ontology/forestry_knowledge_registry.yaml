visualization_tools:
- tool_id: plot_subplot_grid_heatmap
  tool_name_cn: 样方格网指标空间热力图
  chart_type: grid_heatmap
  supported_target_types:
  - MonitoringPlot
  required_inputs:
  - subplot_layout
  - indicator_values
  outputs:
  - grid_heatmap_html
  - grid_heatmap_json
  - top_anomalous_subplots
  description: 展示600个样方在24公顷大样地(20×30格网)中的空间热力分布与宏观格局差异
- tool_id: plot_size_class_distribution
  tool_name_cn: 胸径级或树高级结构分布柱状图
  chart_type: categorical_bar
  supported_target_types:
  - Subplot
  - MonitoringPlot
  - Taxon
  required_inputs:
  - tree_dbh_cm
  - volume_m3
  validation_rules:
  - forestry_diameter_class_binning_only
  - do_not_mix_survey_events
  outputs:
  - size_class_bar_html
  - size_class_bar_json
  description: 按林业测树学标准对单木进行离散径阶分箱(5,10,15,20,>25cm)，展示各径阶株数与蓄积分布
- tool_id: plot_species_composition
  tool_name_cn: 树种多维生态组成对比柱状图
  chart_type: grouped_bar
  supported_target_types:
  - Subplot
  - MonitoringPlot
  required_inputs:
  - species
  - basal_area_m2
  - volume_m3
  validation_rules:
  - no_single_layer_pie_chart
  - report_stem_count_and_basal_area_and_volume
  outputs:
  - species_comp_html
  - species_comp_json
  description: 并列展示各优势树种在株数组成比(%)、断面积占比(%)及蓄积量占比(%)的多维群落结构差异
- tool_id: plot_tree_relationship_scatter
  tool_name_cn: 单木形态关联散点图
  chart_type: scatter_relationship
  supported_target_types:
  - Subplot
  - MonitoringPlot
  required_inputs:
  - tree_dbh_cm
  - tree_height_m
  - hdr
  validation_rules:
  - show_hdr_reference_line_as_attention_signal
  - association_does_not_imply_causation
  outputs:
  - scatter_html
  - scatter_json
  description: 展示单木 DBH 与树高等形态指标的关系，可叠加 H/D 参考线作为形态关注信号；不直接输出风险诊断。
- tool_id: plot_group_comparison_boxplot
  tool_name_cn: 分组结构离散度对比箱线图
  chart_type: boxplot
  supported_target_types:
  - Subplot
  - MonitoringPlot
  - Taxon
  required_inputs:
  - hdr
  - species
  outputs:
  - boxplot_html
  - boxplot_json
  description: 比较不同物种或分组在中位数、四分位间距与异常值单木上的形态分布差异。
- tool_id: plot_tree_spatial_map
  tool_name_cn: 单木空间坐标落图与现场核查导航图
  chart_type: spatial_x_y_map
  supported_target_types:
  - Subplot
  required_inputs:
  - tree_x_m
  - tree_y_m
  - tree_dbh_cm
  - priority
  validation_rules:
  - highlight_field_attention_trees
  - exact_20m_x_20m_spatial_scale
  outputs:
  - spatial_map_html
  - spatial_map_json
  - inspection_target_coordinates
  description: 展示样方内 20m×20m 单木空间定位，可突出需要现场复核的关注个体。
- tool_id: plot_subplot_percentile_profile
  tool_name_cn: 样方指标相对百位排位画像图
  chart_type: percentile_profile
  supported_target_types:
  - Subplot
  required_inputs:
  - density_per_ha
  - mean_dbh_cm
  - shannon_index
  - high_hdr_ratio_pct
  outputs:
  - percentile_profile_html
  - percentile_profile_json
  description: 展示所选小样方在600个样方群体中的百分位(P0-P100)排位画像，一目了然健康与竞争劣势项
environment_semantic_bindings:
  topography:
    source_table: topography_observations
    source_class: TreeTopographyContext
    primary_key: tree_id
    grain: tree
    notes:
    - health_status 不属于地形语义，不应作为地形上下文属性
    - terrain_position 当前数据库未提供，先保持可选字段
  climate:
    source_table: climate_daily_observations
    source_class: ClimateObservation
    station_class: ClimateStation
    grain: station_day
    notes:
    - 原始字段 temp/dewp/wdsp/prcp 等应先映射到语义化字段再参与推理
    - weather_type 当前不应直接用 FRSHTT 原始编码替代
