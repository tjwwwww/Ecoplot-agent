<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ForestryAgent Chat</title>

  <!-- 关键：文件必须保存为 UTF-8；浏览器也按 UTF-8 解析 -->
  <style>
    :root {
      --bg: #eef3f7;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --line: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --chip: #eef2ff;
      --chip-text: #3730a3;
      --danger: #dc2626;
      --ok: #16a34a;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
      --radius: 18px;
      --sidebar-w: 260px;
      --workspace-w: 380px;
      --topbar-h: 74px;
      --composer-h: 118px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-w) minmax(520px, 1fr) var(--workspace-w);
      gap: 0;
      padding: 18px;
    }

    .sidebar,
    .chat-shell,
    .workspace {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .sidebar {
      border-radius: var(--radius) 0 0 var(--radius);
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .chat-shell {
      border-left: 0;
      border-right: 0;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .workspace {
      border-radius: 0 var(--radius) var(--radius) 0;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .brand {
      padding: 20px;
      border-bottom: 1px solid var(--line);
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .new-chat {
      margin: 16px 18px 10px;
      border: 0;
      background: var(--primary);
      color: white;
      border-radius: 12px;
      height: 42px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 650;
    }

    .new-chat:hover { background: var(--primary-dark); }

    .session-list {
      padding: 8px 12px 16px;
      overflow: auto;
      flex: 1;
    }

    .session-item {
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
    }

    .session-item:hover,
    .session-item.active {
      background: var(--panel-2);
    }

    .session-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .topbar {
      height: var(--topbar-h);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 22px;
      flex: 0 0 auto;
    }

    .topbar-title {
      min-width: 0;
    }

    .topbar-title h2 {
      margin: 0;
      font-size: 20px;
    }

    .topbar-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .settings {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .settings input,
    .settings select {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 0 12px;
      outline: none;
      background: white;
      color: var(--text);
      font-size: 13px;
    }

    .settings input:focus,
    .settings select:focus,
    textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }

    #apiBase { width: 220px; }
    #subplotInput { width: 190px; }
    .small-action {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 0 12px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .small-action:hover { background: #eef2ff; }
    .small-action:disabled { opacity: 0.55; cursor: not-allowed; }

    .messages {
      flex: 1;
      overflow: auto;
      padding: 24px 32px 18px;
      background:
        radial-gradient(circle at 30% 0%, rgba(37,99,235,0.04), transparent 28%),
        #fbfdff;
    }

    .empty {
      max-width: 720px;
      margin: 40px auto;
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
    }

    .empty h3 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .empty p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .examples {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .example {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 13px;
      padding: 12px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.45;
    }

    .example:hover {
      background: #eef6ff;
      border-color: #bfdbfe;
    }

    .msg {
      max-width: 820px;
      margin: 0 auto 18px;
      display: flex;
      gap: 12px;
    }

    .msg.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      flex: 0 0 auto;
      font-size: 13px;
    }

    .msg.user .avatar {
      order: 2;
      background: var(--primary);
      color: white;
    }

    .bubble {
      max-width: 78%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 15px;
      background: white;
      line-height: 1.75;
      font-size: 15px;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .msg.user .bubble {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .bubble p { margin: 0 0 10px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { margin-top: 6px; margin-bottom: 10px; padding-left: 24px; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 12px 0 8px; line-height: 1.35; }
    .bubble h1 { font-size: 22px; }
    .bubble h2 { font-size: 19px; }
    .bubble h3 { font-size: 17px; }
    .bubble code {
      background: rgba(15,23,42,0.06);
      border-radius: 6px;
      padding: 2px 5px;
      font-family: Consolas, Monaco, monospace;
      font-size: 0.92em;
    }
    .bubble pre {
      background: #0f172a;
      color: #e5e7eb;
      padding: 12px;
      overflow: auto;
      border-radius: 12px;
      line-height: 1.5;
    }

    .composer {
      height: var(--composer-h);
      border-top: 1px solid var(--line);
      padding: 16px 22px 18px;
      background: white;
      flex: 0 0 auto;
    }

    .composer-box {
      max-width: 920px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 88px;
      gap: 12px;
    }

    textarea {
      resize: none;
      height: 76px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.5;
      outline: none;
    }

    .send {
      border: 0;
      border-radius: 16px;
      background: #111827;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .send:hover { background: #030712; }
    .send:disabled { opacity: .55; cursor: not-allowed; }

    .workspace-header {
      height: var(--topbar-h);
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      flex: 0 0 auto;
    }

    .workspace-header h3 {
      margin: 0;
      font-size: 16px;
    }

    .workspace-header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .tabs {
      display: flex;
      padding: 10px 10px 0;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      flex: 0 0 auto;
    }

    .tab {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 9px 10px;
      cursor: pointer;
      border-radius: 9px 9px 0 0;
      font-size: 13px;
    }

    .tab.active {
      background: var(--panel-2);
      color: var(--text);
      font-weight: 700;
    }

    .workspace-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 14px;
      background: #fcfdff;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .card {
      border: 1px solid var(--line);
      background: white;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.55;
    }

    .card-title {
      font-weight: 800;
      margin-bottom: 6px;
    }

    .muted { color: var(--muted); }

    .tool-row {
      border-left: 4px solid #cbd5e1;
      padding-left: 10px;
    }

    .tool-row.success { border-left-color: var(--ok); }
    .tool-row.error, .tool-row.failed { border-left-color: var(--danger); }

    .artifact img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      display: block;
    }

    .followups {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .followup {
      border: 0;
      background: var(--chip);
      color: var(--chip-text);
      padding: 7px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .dot.busy { background: #f59e0b; }
    .dot.ok { background: #22c55e; }
    .dot.err { background: #ef4444; }

    @media (max-width: 1120px) {
      .app {
        grid-template-columns: 1fr;
        padding: 0;
      }
      .sidebar, .workspace {
        display: none;
      }
      .chat-shell {
        border-radius: 0;
        border: 0;
      }
      #apiBase, #subplotInput { width: 150px; }
      .examples { grid-template-columns: 1fr; }
    }
  </style>

  <!-- Markdown 渲染：联网失败时会自动回退到纯文本 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>ForestryAgent</h1>
        <p>本体驱动的祁连山大样地野外调查智能体测试页。</p>
      </div>
      <button class="new-chat" id="newChatBtn">新建对话</button>
      <div class="session-list" id="sessionList"></div>
    </aside>

    <main class="chat-shell">
      <header class="topbar">
        <div class="topbar-title">
          <h2>ForestryAgent Chat</h2>
          <p>自然语言对话 · 本体理解 · 工具调用 · 图表/报告工作区</p>
        </div>

        <div class="settings">
          <input id="apiBase" placeholder="API 地址，空=当前域名" />
          <select id="modeSelect" title="模式">
            <option value="chat">对话</option>
            <option value="report">报告</option>
          </select>
          <input id="subplotInput" placeholder="当前样方，例如 3018" />
          <button class="small-action" id="regenBtn" title="重新生成当前会话最后一次回答">重新生成</button>
        </div>
      </header>

      <section class="messages" id="messages">
        <div class="empty" id="emptyState">
          <h3>你可以直接像 ChatGPT 一样提问</h3>
          <p>
            这个页面用于测试后端智能体是否能自由对话，并根据问题自主决定是否查询本体、数据库、知识图谱、公式工具或图表工具。
            当前样方只是页面上下文，不会强制限制全局问题。
          </p>
          <div class="examples">
            <button class="example">你能帮我做什么？</button>
            <button class="example">HDR是什么意思？</button>
            <button class="example">乌柳质量状况怎么样？</button>
            <button class="example">这片林子整体怎么样？</button>
            <button class="example">3018样方有什么值得核查？</button>
            <button class="example">画一下乌柳的HDR分布图</button>
          </div>
        </div>
      </section>

      <footer class="composer">
        <div class="composer-box">
          <textarea id="questionInput" placeholder="输入问题，例如：帮我分析一下乌柳的质量状况，或者 3018 样方有什么值得核查？"></textarea>
          <button class="send" id="sendBtn">发送</button>
        </div>
      </footer>
    </main>

    <aside class="workspace">
      <div class="workspace-header">
        <h3>工作区</h3>
        <p>
          <span class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">等待提问</span>
          </span>
        </p>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="result">结果</button>
        <button class="tab" data-tab="artifacts">图表/文件</button>
        <button class="tab" data-tab="trace">工具依据</button>
        <button class="tab" data-tab="debug">调试</button>
      </div>

      <div class="workspace-body">
        <div class="panel active" id="panel-result">
          <div class="card">
            <div class="card-title">说明</div>
            <div class="muted">智能体回答会显示在中间对话区；右侧用于显示语义计划、后续追问、图表、报告和工具调用记录。</div>
          </div>
        </div>
        <div class="panel" id="panel-artifacts"></div>
        <div class="panel" id="panel-trace"></div>
        <div class="panel" id="panel-debug"></div>
      </div>
    </aside>
  </div>

  <script>
    const state = {
      sessionId: localStorage.getItem("forestry_agent_session_id") || null,
      sessions: JSON.parse(localStorage.getItem("forestry_agent_sessions") || "[]"),
      busy: false,
      lastFinal: null
    };

    const $ = (id) => document.getElementById(id);

    const messagesEl = $("messages");
    const emptyState = $("emptyState");
    const questionInput = $("questionInput");
    const sendBtn = $("sendBtn");
    const regenBtn = $("regenBtn");
    const apiBaseInput = $("apiBase");
    const modeSelect = $("modeSelect");
    const subplotInput = $("subplotInput");
    const statusDot = $("statusDot");
    const statusText = $("statusText");

    apiBaseInput.value = localStorage.getItem("forestry_agent_api_base") || "";

    function apiBase() {
      const raw = apiBaseInput.value.trim();
      if (!raw) return "";
      return raw.replace(/\/$/, "");
    }

    function endpoint(path) {
      return apiBase() + path;
    }

    function setStatus(type, text) {
      statusDot.className = "dot" + (type ? " " + type : "");
      statusText.textContent = text;
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function renderMarkdown(text) {
      if (window.marked && window.marked.parse) {
        return window.marked.parse(String(text || ""));
      }
      return "<p>" + escapeHtml(text).replace(/\n/g, "<br>") + "</p>";
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function ensureMessagesStarted() {
      if (emptyState) emptyState.style.display = "none";
    }

    function addMessage(role, content, options = {}) {
      ensureMessagesStarted();
      const msg = document.createElement("div");
      msg.className = "msg " + role;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "user" ? "你" : "AI";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = role === "assistant" ? renderMarkdown(content) : escapeHtml(content).replace(/\n/g, "<br>");

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);

      if (options.followups && options.followups.length) {
        const wrap = document.createElement("div");
        wrap.className = "msg assistant";
        const spacer = document.createElement("div");
        spacer.className = "avatar";
        spacer.style.visibility = "hidden";
        const chips = document.createElement("div");
        chips.className = "bubble";
        chips.innerHTML = `<div class="muted" style="font-size:12px;margin-bottom:6px;">可以继续问：</div>`;
        const f = document.createElement("div");
        f.className = "followups";
        options.followups.slice(0, 4).forEach(x => {
          const b = document.createElement("button");
          b.className = "followup";
          b.textContent = x;
          b.onclick = () => {
            questionInput.value = x;
            questionInput.focus();
          };
          f.appendChild(b);
        });
        chips.appendChild(f);
        wrap.appendChild(spacer);
        wrap.appendChild(chips);
        messagesEl.appendChild(wrap);
      }

      scrollBottom();
      return bubble;
    }

    function addLoadingMessage() {
      return addMessage("assistant", "正在理解问题，并判断是否需要调用本体、数据库或工具……");
    }

    function setBubbleContent(bubble, content) {
      bubble.innerHTML = renderMarkdown(content || "");
      scrollBottom();
    }

    function normalizeSession(raw) {
      return {
        id: raw.session_id || raw.id,
        title: raw.title || raw.first_user_message || "未命名对话",
        updatedAt: raw.updated_at || raw.updatedAt || "",
        messageCount: raw.message_count || raw.messageCount || 0
      };
    }

    function persistLocalSessions() {
      localStorage.setItem("forestry_agent_sessions", JSON.stringify(state.sessions));
    }

    function saveSessionTitle(question) {
      if (!state.sessionId) return;
      const title = String(question || "新对话").slice(0, 40);
      const exists = state.sessions.find(s => s.id === state.sessionId);
      if (exists) {
        exists.title = exists.title || title;
        exists.updatedAt = new Date().toLocaleString();
      } else {
        state.sessions.unshift({ id: state.sessionId, title, updatedAt: new Date().toLocaleString(), messageCount: 2 });
      }
      state.sessions = state.sessions.slice(0, 50);
      persistLocalSessions();
      renderSessions();
      refreshSessions(false);
    }

    function renderSessions() {
      const list = $("sessionList");
      list.innerHTML = "";
      if (!state.sessions.length) {
        const empty = document.createElement("div");
        empty.className = "session-meta";
        empty.style.padding = "10px 12px";
        empty.textContent = "暂无历史会话";
        list.appendChild(empty);
        return;
      }
      state.sessions.forEach(s => {
        const btn = document.createElement("button");
        btn.className = "session-item" + (s.id === state.sessionId ? " active" : "");
        const meta = [s.updatedAt, s.messageCount ? `${s.messageCount} 条消息` : ""].filter(Boolean).join(" · ");
        btn.innerHTML = `<div class="session-title">${escapeHtml(s.title || "未命名对话")}</div><div class="session-meta">${escapeHtml(meta)}</div>`;
        btn.onclick = () => switchSession(s.id);
        list.appendChild(btn);
      });
    }

    async function refreshSessions(showError = false) {
      try {
        const res = await fetch(endpoint("/api/agent/sessions?limit=50"));
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); }
        catch { throw new Error("历史会话接口返回的不是 JSON：" + text.slice(0, 300)); }
        if (!res.ok) throw new Error(data.detail ? JSON.stringify(data.detail) : text);
        state.sessions = (data.sessions || []).map(normalizeSession).filter(s => s.id);
        persistLocalSessions();
        renderSessions();
      } catch (err) {
        renderSessions();
        if (showError) {
          addMessage("assistant", "历史会话加载失败：\n\n" + (err.message || String(err)));
        }
      }
    }

    function clearMessages() {
      messagesEl.querySelectorAll(".msg").forEach(x => x.remove());
      if (emptyState) emptyState.style.display = "";
    }

    function renderArtifactsPanel(artifacts, emptyText = "本轮没有生成图表或文件。") {
      const artifactsPanel = $("panel-artifacts");
      if (!artifacts || !artifacts.length) {
        artifactsPanel.innerHTML = card("图表/文件", `<div class="muted">${escapeHtml(emptyText)}</div>`);
        return;
      }
      artifactsPanel.innerHTML = artifacts.map((a, idx) => {
        const url = a.artifact_url || a.relative_url || a.url || a.path || "";
        const abs = a.artifact_absolute_url || (url && url.startsWith("/") ? endpoint(url) : url);
        const isImage = /\.(png|jpg|jpeg|webp|gif|svg)$/i.test(abs);
        const isHtml = /\.html?$/i.test(abs);
        const fileName = decodeURIComponent(String(abs).split("/").pop() || `文件 ${idx + 1}`);
        return card(fileName, `
          ${isImage ? `<div class="artifact"><img src="${escapeHtml(abs)}" alt="artifact"></div>` : ""}
          ${isHtml ? `<iframe src="${escapeHtml(abs)}" style="width:100%;height:360px;border:1px solid var(--line);border-radius:12px;background:white;"></iframe>` : ""}
          <div style="margin-top:8px;"><a href="${escapeHtml(abs)}" target="_blank" rel="noreferrer">新窗口打开</a></div>
          <details style="margin-top:8px;"><summary>查看文件信息</summary><pre>${escapeHtml(JSON.stringify(a, null, 2))}</pre></details>
        `);
      }).join("");
    }

    async function switchSession(sessionId) {
      if (state.busy || !sessionId) return;
      state.sessionId = sessionId;
      localStorage.setItem("forestry_agent_session_id", state.sessionId);
      renderSessions();
      setStatus("busy", "正在恢复历史会话");
      try {
        const res = await fetch(endpoint(`/api/agent/sessions/${encodeURIComponent(sessionId)}/messages?limit=300`));
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); }
        catch { throw new Error("历史消息接口返回的不是 JSON：" + text.slice(0, 300)); }
        if (!res.ok) throw new Error(data.detail ? JSON.stringify(data.detail) : text);

        clearMessages();
        const messages = data.messages || [];
        const restoredArtifacts = [];
        state.lastSessionMessages = messages;
        if (messages.length) {
          ensureMessagesStarted();
          messages.forEach(m => {
            if (m.role === "user" || m.role === "assistant") {
              addMessage(m.role, m.content || "");
            }
            (m.artifacts || []).forEach(a => restoredArtifacts.push(a));
          });
        }
        const current = state.sessions.find(s => s.id === sessionId);
        $("panel-result").innerHTML = card("已恢复会话", `<div class="muted">${escapeHtml(current?.title || sessionId)}</div><div style="margin-top:8px;">共 ${messages.length} 条消息，图表/文件 ${restoredArtifacts.length} 个。</div>`);
        renderArtifactsPanel(restoredArtifacts, "这个历史会话没有保存图表或文件。旧版本生成的图如果只在回答正文里出现本地路径，可点击正文中的链接打开。");
        switchTab(restoredArtifacts.length ? "artifacts" : "result");
        setStatus("ok", "已恢复会话");
      } catch (err) {
        addMessage("assistant", "恢复历史会话失败：\n\n" + (err.message || String(err)));
        setStatus("err", "恢复失败");
      }
    }

    function switchTab(name) {
      document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x.dataset.tab === name));
      document.querySelectorAll(".panel").forEach(x => x.classList.toggle("active", x.id === "panel-" + name));
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.onclick = () => switchTab(btn.dataset.tab);
    });

    function card(title, bodyHtml, cls = "") {
      return `<div class="card ${cls}"><div class="card-title">${escapeHtml(title)}</div>${bodyHtml}</div>`;
    }

    function renderProcessHtml(process) {
      if (!process || !process.length) {
        return `<div class="muted">本轮没有返回阶段性过程。</div>`;
      }
      return process.map((p, idx) => {
        const status = p.status || "done";
        const mark = status === "done" ? "✓" : status === "running" ? "…" : "!";
        return `<div style="display:flex;gap:10px;margin:8px 0;line-height:1.45;">
          <div style="width:22px;height:22px;border-radius:50%;background:#eef2ff;color:#3730a3;display:flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 auto;">${mark}</div>
          <div><b>${escapeHtml(p.stage || ('步骤' + (idx + 1)))}</b><br><span class="muted">${escapeHtml(p.message || '')}</span></div>
        </div>`;
      }).join("");
    }

    function renderEvidenceHtml(items) {
      if (!items || !items.length) {
        return `<div class="muted">暂无额外依据摘要。简单问答通常不需要调用数据工具。</div>`;
      }
      return items.map(x => `<div style="margin:8px 0;line-height:1.55;">
        <b>${escapeHtml(x.label || x.type || '依据')}</b><br>
        <span class="muted">${escapeHtml(x.description || '')}</span>
      </div>`).join("");
    }

    function renderWorkspace(finalData, rawDebug) {
      state.lastFinal = finalData;

      const resultPanel = $("panel-result");
      const tracePanel = $("panel-trace");
      const artifactsPanel = $("panel-artifacts");
      const debugPanel = $("panel-debug");

      const plan = finalData.semantic_plan || finalData.plan || finalData.analysis_plan;
      const focus = finalData.last_focus || {};
      const followups = finalData.followups || [];
      const process = finalData.visible_process || [];
      const evidence = finalData.evidence_summary || [];

      let resultHtml = "";
      resultHtml += card("本轮任务", `
        <div>answer_type：<code>${escapeHtml(finalData.answer_type || "")}</code></div>
        <div>scope：<code>${escapeHtml(finalData.scope || "")}</code></div>
        <div>session_id：<code>${escapeHtml(finalData.session_id || "")}</code></div>
      `);

      resultHtml += card("智能体工作过程", renderProcessHtml(process));
      resultHtml += card("依据摘要", renderEvidenceHtml(evidence));

      if (Object.keys(focus).length) {
        const readable = [];
        if (focus.subplot_id) readable.push(`当前讨论样方：${focus.subplot_id}`);
        if (focus.tree_id) readable.push(`当前讨论单木：${focus.tree_id}`);
        if (focus.taxon) readable.push(`当前讨论树种：${focus.taxon}`);
        if (focus.ambient_subplot_id) readable.push(`页面环境样方：${focus.ambient_subplot_id}`);
        resultHtml += card("当前焦点", readable.length ? readable.map(x => `<div>${escapeHtml(x)}</div>`).join("") : `<pre>${escapeHtml(JSON.stringify(focus, null, 2))}</pre>`);
      }

      if (followups.length) {
        resultHtml += card("后续追问", `<div class="followups">${
          followups.slice(0, 6).map(x => `<button class="followup" data-q="${escapeHtml(x)}">${escapeHtml(x)}</button>`).join("")
        }</div>`);
      }

      resultPanel.innerHTML = resultHtml;
      resultPanel.querySelectorAll(".followup").forEach(btn => {
        btn.onclick = () => {
          questionInput.value = btn.dataset.q;
          questionInput.focus();
        };
      });

      const tools = finalData.used_tools || [];
      if (!tools.length) {
        tracePanel.innerHTML = card("工具依据", `<div class="muted">本轮没有调用数据工具，属于直接回答或轻量解释。</div>`);
      } else {
        tracePanel.innerHTML = tools.map((t, idx) => {
          const status = String(t.status || "unknown");
          const title = t.display_name || t.tool || "unknown_tool";
          const detail = t.detail || {};
          const args = t.arguments || {};
          return card(`${idx + 1}. ${title} · ${status}`,
            `<div class="muted">${escapeHtml(t.tool || '')}</div>
             <details style="margin-top:8px;"><summary>查看参数/调试信息</summary><pre>${escapeHtml(JSON.stringify({arguments: args, detail}, null, 2))}</pre></details>`,
            "tool-row " + status
          );
        }).join("");
      }

      const artifacts = finalData.artifacts || [];
      renderArtifactsPanel(artifacts);
      if (artifacts.length) switchTab("artifacts");

      debugPanel.innerHTML = "";
      if (plan) {
        debugPanel.innerHTML += card("SemanticPlan 原始 JSON", `<pre>${escapeHtml(JSON.stringify(plan, null, 2))}</pre>`);
      }
      if (finalData.candidate_preview && finalData.candidate_preview.length) {
        debugPanel.innerHTML += card("候选召回 preview", `<pre>${escapeHtml(JSON.stringify(finalData.candidate_preview, null, 2))}</pre>`);
      }
      if (finalData.debug_trace && finalData.debug_trace.length) {
        debugPanel.innerHTML += card("debug_trace", `<pre>${escapeHtml(JSON.stringify(finalData.debug_trace, null, 2))}</pre>`);
      }
      debugPanel.innerHTML += card("原始返回", `<pre>${escapeHtml(JSON.stringify(rawDebug || finalData, null, 2))}</pre>`);
    }

    function buildContext() {
      const subplot = subplotInput.value.trim();
      const ctx = {
        current_page: "chat",
        context_policy: "auto"
      };
      if (subplot) {
        ctx.current_subplot_id = subplot;
        ctx.subplot_id = subplot;
      }
      return ctx;
    }

    function appendProgressToBubble(bubble, events) {
      const lines = events.map(e => {
        const mark = e.status === "done" ? "✓" : e.status === "running" ? "…" : "•";
        return `${mark} ${e.stage || '阶段'}：${e.message || ''}`;
      });
      bubble.innerHTML = renderMarkdown("智能体正在工作：\n\n" + lines.map(x => "- " + x).join("\n"));
      scrollBottom();
    }

    async function sendQuestion() {
      if (state.busy) return;
      const question = questionInput.value.trim();
      if (!question) return;

      localStorage.setItem("forestry_agent_api_base", apiBaseInput.value.trim());

      state.busy = true;
      sendBtn.disabled = true;
      if (regenBtn) regenBtn.disabled = true;
      setStatus("busy", "智能体运行中");
      addMessage("user", question);
      questionInput.value = "";

      const loadingBubble = addLoadingMessage();
      const progressEvents = [];
      let streamedAnswer = "";
      let finalData = null;

      const payload = {
        session_id: state.sessionId,
        question,
        mode: modeSelect.value,
        context: buildContext(),
        max_rounds: 6,
        include_plan: false,
        include_candidates: false,
        include_debug: false
      };

      async function callNormalFallback() {
        const res = await fetch(endpoint("/api/agent/chat"), {
          method: "POST",
          headers: {"Content-Type": "application/json; charset=utf-8"},
          body: JSON.stringify(payload)
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); }
        catch (e) { throw new Error("后端返回的不是 JSON：\n" + text.slice(0, 1000)); }
        if (!res.ok) throw new Error(data.detail ? JSON.stringify(data.detail, null, 2) : text);
        return data;
      }

      try {
        const res = await fetch(endpoint("/api/agent/chat/stream"), {
          method: "POST",
          headers: {"Content-Type": "application/json; charset=utf-8"},
          body: JSON.stringify(payload)
        });

        if (!res.ok || !res.body) {
          finalData = await callNormalFallback();
        } else {
          const reader = res.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let buffer = "";

          while (true) {
            const {value, done} = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, {stream: true});
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
              if (!line.trim()) continue;
              let event;
              try { event = JSON.parse(line); }
              catch { continue; }

              const type = event.type;
              const data = event.data || {};

              if (type === "stage") {
                const idx = progressEvents.findIndex(x => x.stage === data.stage);
                if (idx >= 0) progressEvents[idx] = data;
                else progressEvents.push(data);
                appendProgressToBubble(loadingBubble, progressEvents);
              } else if (type === "ontology_retrieval" || type === "semantic_planning" || type === "domain_execution") {
                progressEvents.push({stage: type, status: "running", message: data.message || type});
                appendProgressToBubble(loadingBubble, progressEvents);
              } else if (type === "answer_chunk") {
                streamedAnswer += data.text || "";
                setBubbleContent(loadingBubble, streamedAnswer || "正在生成回答……");
              } else if (type === "final") {
                finalData = data;
              } else if (type === "error") {
                throw new Error(data.message || "流式接口出错");
              }
            }
          }
        }

        if (!finalData) {
          finalData = await callNormalFallback();
        }

        const answer = finalData.answer || streamedAnswer || finalData.message || "后端没有返回 answer 字段。";
        setBubbleContent(loadingBubble, answer);

        if (finalData.session_id) {
          state.sessionId = finalData.session_id;
          localStorage.setItem("forestry_agent_session_id", state.sessionId);
          saveSessionTitle(question);
        }

        if (finalData.followups && finalData.followups.length) {
          addMessage("assistant", "", { followups: finalData.followups });
        }

        renderWorkspace(finalData, finalData);
        setStatus("ok", "完成");
      } catch (err) {
        const msg = "请求失败：\n\n" + (err && err.message ? err.message : String(err));
        setBubbleContent(loadingBubble, msg);
        $("panel-debug").innerHTML = card("错误信息", `<pre>${escapeHtml(msg)}</pre>`, "tool-row error");
        switchTab("debug");
        setStatus("err", "出错");
      } finally {
        state.busy = false;
        sendBtn.disabled = false;
        if (regenBtn) regenBtn.disabled = false;
        questionInput.focus();
      }
    }

    async function regenerateLastAnswer() {
      if (state.busy) return;
      if (!state.sessionId) {
        addMessage("assistant", "当前还没有会话，无法重新生成。请先发送一个问题。");
        return;
      }
      state.busy = true;
      sendBtn.disabled = true;
      if (regenBtn) regenBtn.disabled = true;
      setStatus("busy", "正在重新生成");
      const loadingBubble = addLoadingMessage();
      try {
        const res = await fetch(endpoint(`/api/agent/sessions/${encodeURIComponent(state.sessionId)}/regenerate?max_rounds=6`), {
          method: "POST",
          headers: {"Content-Type": "application/json; charset=utf-8"}
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); }
        catch { throw new Error("重新生成接口返回的不是 JSON：" + text.slice(0, 1000)); }
        if (!res.ok) throw new Error(data.detail ? JSON.stringify(data.detail, null, 2) : text);
        await switchSession(state.sessionId);
        renderWorkspace(data, data);
        setStatus("ok", "已重新生成");
      } catch (err) {
        setBubbleContent(loadingBubble, "重新生成失败：\n\n" + (err.message || String(err)));
        setStatus("err", "重新生成失败");
      } finally {
        state.busy = false;
        sendBtn.disabled = false;
        if (regenBtn) regenBtn.disabled = false;
        questionInput.focus();
      }
    }

    $("sendBtn").onclick = sendQuestion;
    if (regenBtn) regenBtn.onclick = regenerateLastAnswer;

    questionInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
      }
    });

    $("newChatBtn").onclick = () => {
      state.sessionId = null;
      localStorage.removeItem("forestry_agent_session_id");
      clearMessages();
      renderSessions();
      setStatus("", "已新建对话");
      $("panel-result").innerHTML = card("新对话", `<div class="muted">已经清空前端会话 ID。下一次提问会由后端创建新的 session_id。</div>`);
      switchTab("result");
    };

    document.querySelectorAll(".example").forEach(btn => {
      btn.onclick = () => {
        questionInput.value = btn.textContent.trim();
        questionInput.focus();
      };
    });

    renderSessions();
    refreshSessions(false);
    questionInput.focus();
  </script>
</body>
</html>
